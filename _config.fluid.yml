navbar:
  blog_title: "Codex Skill Lab"
  menu:
    - { key: "首页", link: "/" }
    - { key: "归档", link: "/archives/" }
    - { key: "分类", link: "/categories/" }
    - { key: "标签", link: "/tags/" }
    - { key: "RSS", link: "/atom.xml", icon: "iconfont icon-rss" }

search:
  enable: true

dark_mode:
  enable: true
  default: light

fun_features:
  typing:
    enable: false
    typeSpeed: 55
    cursorChar: "_"
    loop: false

custom_css:
  - /css/layout-conservative.css

web_analytics:
  enable: true
  follow_dnt: true
  openkounter:
    server_url: ""

canonical:
  enable: true

index:
  banner_img: /img/banner-desk.svg
  banner_img_height: 42
  banner_mask_alpha: 0.35
  slogan:
    enable: true
    text:
      - "Codex Skill Lab"
  auto_excerpt:
    enable: true
  post_url_target: _self
  post_meta:
    date: true
    category: true
    tag: true
    views: false

post:
  banner_img: /img/banner-desk.svg
  banner_img_height: 30
  banner_mask_alpha: 0.35
  default_index_img: /img/banner-desk.svg
  meta:
    wordcount:
      enable: true
    min2read:
      enable: true
      awl: 2
      wpm: 60
    views:
      enable: false

archive:
  banner_img: /img/banner-desk.svg
  banner_img_height: 30
  banner_mask_alpha: 0.35

color:
  body_bg_color: "#f6f7f8"
  body_bg_color_dark: "#14171a"
  navbar_bg_color: "#ffffff"
  navbar_bg_color_dark: "#14171a"
  navbar_text_color: "#2f3437"
  navbar_text_color_dark: "#e5e7eb"
  subtitle_color: "#ffffff"
  subtitle_color_dark: "#ffffff"
  text_color: "#2f3437"
  text_color_dark: "#e5ebe4"
  sec_text_color: "#6b7280"
  sec_text_color_dark: "#a3afa8"
  board_color: "#ffffff"
  board_color_dark: "#1f2428"
  post_text_color: "#2f3437"
  post_text_color_dark: "#e5ebe4"
  post_heading_color: "#111827"
  post_heading_color_dark: "#f4faf2"
  post_link_color: "#2563eb"
  post_link_color_dark: "#93c5fd"
  link_hover_color: "#1d4ed8"
  link_hover_color_dark: "#bfdbfe"
  link_hover_bg_color: "#eff6ff"
  link_hover_bg_color_dark: "#1e293b"
  line_color: "#e5e7eb"
  line_color_dark: "#394842"
  scrollbar_color: "#9aaa9f"
  scrollbar_color_dark: "#607069"
  scrollbar_hover_color: "#4d8f6a"
  scrollbar_hover_color_dark: "#98d2ad"

footer:
  statistics:
    enable: false
  content: '
    <span>Powered by Hexo & Fluid</span>
  '
