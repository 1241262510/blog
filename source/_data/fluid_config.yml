navbar:
  blog_title: "Codex Skill Lab"
  menu:
    - { key: "首页", link: "/" }
    - { key: "归档", link: "/archives/" }
    - { key: "分类", link: "/categories/" }
    - { key: "标签", link: "/tags/" }
    - { key: "RSS", link: "/atom.xml", icon: "iconfont icon-rss" }

search:
  enable: true

fun_features:
  typing:
    enable: true
    typeSpeed: 55
    cursorChar: "_"
    loop: false

custom_css:
  - /css/custom.css

web_analytics:
  enable: true
  follow_dnt: true
  openkounter:
    server_url: ""

canonical:
  enable: true

index:
  banner_img: /img/banner-desk.svg
  banner_img_height: 78
  banner_mask_alpha: 0.18
  slogan:
    enable: true
    text:
      - "Codex 驱动写作、调试、发布的工程笔记"
      - "ChatGPT 对话沉淀成可复用的技能包"
      - "把自动化链路写清楚，把踩坑路径留给下一次"
      - "从提示词到脚本，从本地实验到稳定发布"
  auto_excerpt:
    enable: true
  post_url_target: _self
  post_meta:
    date: true
    category: true
    tag: true
    views: false

post:
  banner_img: /img/banner-desk.svg
  banner_img_height: 48
  banner_mask_alpha: 0.22
  default_index_img: /img/banner-desk.svg
  meta:
    wordcount:
      enable: true
    min2read:
      enable: true
      awl: 2
      wpm: 60
    views:
      enable: false

archive:
  banner_img: /img/banner-desk.svg
  banner_img_height: 45
  banner_mask_alpha: 0.22

color:
  body_bg_color: "#f4f6f1"
  body_bg_color_dark: "#141817"
  navbar_bg_color: "#141817"
  navbar_bg_color_dark: "#101412"
  navbar_text_color: "#f7fbf4"
  navbar_text_color_dark: "#edf5ec"
  subtitle_color: "#f7fbf4"
  subtitle_color_dark: "#edf5ec"
  text_color: "#181d1b"
  text_color_dark: "#e5ebe4"
  sec_text_color: "#63706a"
  sec_text_color_dark: "#a3afa8"
  board_color: "#fbfcf7"
  board_color_dark: "#1d2421"
  post_text_color: "#2a332f"
  post_text_color_dark: "#e5ebe4"
  post_heading_color: "#181d1b"
  post_heading_color_dark: "#f4faf2"
  post_link_color: "#246044"
  post_link_color_dark: "#98d2ad"
  link_hover_color: "#153d2c"
  link_hover_color_dark: "#c0e4cb"
  link_hover_bg_color: "#e8f1ea"
  link_hover_bg_color_dark: "#263a30"
  line_color: "#d9e0da"
  line_color_dark: "#394842"
  scrollbar_color: "#9aaa9f"
  scrollbar_color_dark: "#607069"
  scrollbar_hover_color: "#4d8f6a"
  scrollbar_hover_color_dark: "#98d2ad"

footer:
  statistics:
    enable: false
  content: '<span>Powered by Hexo & Fluid</span>'
