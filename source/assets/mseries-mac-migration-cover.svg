      <stop offset="100%" stop-color="#1b2d4a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#4fb5ff" stop-opacity="0.24"/>
      <stop offset="55%" stop-color="#4fb5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4fb5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
